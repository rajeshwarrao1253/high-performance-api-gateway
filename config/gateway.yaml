# High-Performance API Gateway Configuration
# This file defines routes, upstreams, middleware, and server settings.

server:
  port: "8080"
  metrics_port: "9090"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  max_header_bytes: 1048576

redis:
  addr: "redis:6379"
  password: ""
  db: 0
  pool_size: 20
  min_idle_conns: 5

jwt:
  secret: "your-secret-key-change-in-production"
  token_header: "Authorization"
  token_prefix: "Bearer"
  issuer: "api-gateway"
  audience: ["api"]
  max_age: 24h
  refresh_threshold: 1h

rate_limit:
  enabled: true
  default_limit: 1000
  default_window: 1m
  redis_prefix: "ratelimit:"
  burst_size: 50
  per_client_limit: true
  per_endpoint: true

cache:
  enabled: true
  ttl: 5m
  redis_prefix: "cache:"
  max_body_size: 10485760
  cache_methods: ["GET", "HEAD"]
  cache_status: [200, 301, 404]

circuit_breaker:
  enabled: true
  failure_threshold: 5
  recovery_timeout: 30s
  half_open_max_calls: 3
  success_threshold: 2

cors:
  enabled: true
  allowed_origins: ["*"]
  allowed_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  allowed_headers: ["Authorization", "Content-Type", "X-Request-ID"]
  exposed_headers: ["X-RateLimit-Limit", "X-RateLimit-Remaining", "X-Request-ID"]
  allow_credentials: true
  max_age: 86400

log:
  level: "info"
  format: "json"
  output: "stdout"
  enable_caller: true

# Route definitions - matched in order
routes:
  # Public health check - no auth required
  - path: "/health"
    methods: ["GET"]
    upstream: "echo_service"
    middleware: ["request_id", "logging", "metrics"]
    require_auth: false

  # Public status endpoint
  - path: "/status"
    methods: ["GET"]
    upstream: "echo_service"
    middleware: ["request_id", "logging", "metrics"]
    require_auth: false

  # User service - authenticated and rate limited
  - path: "/api/v1/users/*"
    methods: ["GET", "POST", "PUT", "DELETE"]
    upstream: "user_service"
    middleware: ["cors", "request_id", "auth", "rate_limit", "cache", "logging", "metrics"]
    require_auth: true
    allowed_roles: ["admin", "user"]
    cache_ttl: 2m
    rate_limit_override:
      limit: 500
      window: 1m
      burst: 25

  # Order service - authenticated with higher rate limit
  - path: "/api/v1/orders/*"
    methods: ["GET", "POST", "PUT", "PATCH"]
    upstream: "order_service"
    middleware: ["cors", "request_id", "auth", "rate_limit", "logging", "metrics"]
    require_auth: true
    allowed_roles: ["admin", "user"]
    rate_limit_override:
      limit: 200
      window: 1m
      burst: 10

  # Admin endpoints - restricted access
  - path: "/api/v1/admin/*"
    methods: ["GET", "POST", "PUT", "DELETE"]
    upstream: "user_service"
    middleware: ["cors", "request_id", "auth", "rate_limit", "logging", "metrics"]
    require_auth: true
    allowed_roles: ["admin"]
    rate_limit_override:
      limit: 100
      window: 1m
      burst: 5

  # Payment webhooks - no auth, circuit breaker
  - path: "/webhooks/*"
    methods: ["POST"]
    upstream: "order_service"
    middleware: ["request_id", "rate_limit", "logging", "metrics"]
    require_auth: false
    rate_limit_override:
      limit: 50
      window: 1m
      burst: 5

  # Default catch-all route
  - path: "/api/v1/*"
    methods: ["*"]
    upstream: "echo_service"
    middleware: ["cors", "request_id", "auth", "rate_limit", "cache", "logging", "metrics"]
    require_auth: true

# Upstream service definitions
upstreams:
  user_service:
    balancer: "least_connections"
    health_check:
      path: "/health"
      interval: 10s
      timeout: 5s
      failures: 3
    targets:
      - url: "http://user-service-1:8081"
        weight: 2
        priority: 1
      - url: "http://user-service-2:8081"
        weight: 1
        priority: 1
    timeout: 30s
    retry:
      attempts: 3
      backoff: 100ms
      retryable_codes: [502, 503, 504]

  order_service:
    balancer: "round_robin"
    health_check:
      path: "/health"
      interval: 10s
      timeout: 5s
      failures: 3
    targets:
      - url: "http://order-service-1:8082"
        weight: 1
        priority: 1
      - url: "http://order-service-2:8082"
        weight: 1
        priority: 1
    timeout: 30s
    retry:
      attempts: 2
      backoff: 200ms
      retryable_codes: [502, 503]

  echo_service:
    balancer: "round_robin"
    health_check:
      path: "/health"
      interval: 30s
      timeout: 5s
      failures: 2
    targets:
      - url: "http://echo-service:8083"
        weight: 1
        priority: 1
    timeout: 10s
    retry:
      attempts: 1
      backoff: 50ms
      retryable_codes: [503]
