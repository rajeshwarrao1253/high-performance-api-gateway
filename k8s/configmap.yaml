# API Gateway ConfigMap for gateway.yaml configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: default
  labels:
    app: api-gateway
data:
  gateway.yaml: |
    server:
      port: "8080"
      metrics_port: "9090"
      read_timeout: 30s
      write_timeout: 30s
      idle_timeout: 120s
      max_header_bytes: 1048576

    redis:
      addr: "redis:6379"
      password: ""
      db: 0
      pool_size: 20
      min_idle_conns: 5

    jwt:
      secret: "${JWT_SECRET:kubernetes-secret-change-me}"
      token_header: "Authorization"
      token_prefix: "Bearer"
      issuer: "api-gateway"
      audience: ["api"]
      max_age: 24h
      refresh_threshold: 1h

    rate_limit:
      enabled: true
      default_limit: 1000
      default_window: 1m
      redis_prefix: "ratelimit:"
      burst_size: 50
      per_client_limit: true
      per_endpoint: true

    cache:
      enabled: true
      ttl: 5m
      redis_prefix: "cache:"
      max_body_size: 10485760
      cache_methods: ["GET", "HEAD"]
      cache_status: [200, 301, 404]

    circuit_breaker:
      enabled: true
      failure_threshold: 5
      recovery_timeout: 30s
      half_open_max_calls: 3
      success_threshold: 2

    cors:
      enabled: true
      allowed_origins: ["*"]
      allowed_methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
      allowed_headers: ["Authorization", "Content-Type", "X-Request-ID"]
      exposed_headers: ["X-RateLimit-Limit", "X-RateLimit-Remaining", "X-Request-ID"]
      allow_credentials: true
      max_age: 86400

    log:
      level: "info"
      format: "json"
      output: "stdout"
      enable_caller: true

    routes:
      - path: "/health"
        methods: ["GET"]
        upstream: "echo_service"
        middleware: ["request_id", "logging", "metrics"]
        require_auth: false

      - path: "/api/v1/users/*"
        methods: ["GET", "POST", "PUT", "DELETE"]
        upstream: "user_service"
        middleware: ["cors", "request_id", "auth", "rate_limit", "cache", "logging", "metrics"]
        require_auth: true
        allowed_roles: ["admin", "user"]

      - path: "/api/v1/orders/*"
        methods: ["GET", "POST", "PUT", "PATCH"]
        upstream: "order_service"
        middleware: ["cors", "request_id", "auth", "rate_limit", "logging", "metrics"]
        require_auth: true
        allowed_roles: ["admin", "user"]

      - path: "/api/v1/admin/*"
        methods: ["GET", "POST", "PUT", "DELETE"]
        upstream: "user_service"
        middleware: ["cors", "request_id", "auth", "rate_limit", "logging", "metrics"]
        require_auth: true
        allowed_roles: ["admin"]

      - path: "/api/v1/*"
        methods: ["*"]
        upstream: "echo_service"
        middleware: ["cors", "request_id", "auth", "rate_limit", "cache", "logging", "metrics"]
        require_auth: true

    upstreams:
      user_service:
        balancer: "least_connections"
        health_check:
          path: "/health"
          interval: 10s
          timeout: 5s
          failures: 3
        targets:
          - url: "http://user-service.default.svc.cluster.local:8080"
            weight: 1
            priority: 1
        timeout: 30s
        retry:
          attempts: 3
          backoff: 100ms
          retryable_codes: [502, 503, 504]

      order_service:
        balancer: "round_robin"
        health_check:
          path: "/health"
          interval: 10s
          timeout: 5s
          failures: 3
        targets:
          - url: "http://order-service.default.svc.cluster.local:8080"
            weight: 1
            priority: 1
        timeout: 30s
        retry:
          attempts: 2
          backoff: 200ms
          retryable_codes: [502, 503]

      echo_service:
        balancer: "round_robin"
        health_check:
          path: "/health"
          interval: 30s
          timeout: 5s
          failures: 2
        targets:
          - url: "http://httpbin.default.svc.cluster.local:8080"
            weight: 1
            priority: 1
        timeout: 10s
        retry:
          attempts: 1
          backoff: 50ms
          retryable_codes: [503]
